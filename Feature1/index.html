<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature 1-Resposive Navigation Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        nav{
            background: #2563eb;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
        }
        .logo{
            font-size: 20px;
            font-weight: bold;
        }
        ul{
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;

        }
        ul  li {
            margin-left:20ox ;
            position: relative;
        }
        ul li a{
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s;
        }
        ul li a:hover{
            color: #d1d5db;

        }
        ul li ul.dropdown{
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #1e40af;
            padding: 10px 0;
            min-width: 150px;
        }
        ul li ul.dropdwn li{
            margin: 0;
        }
        ul li ul.dropdown li a{
            display: block;
            padding: 8px 15px;
        }
        ul li:hover ul.dropddown{
            display: block;
        }
        .hamburger{
            display: none;
            flex-direction: column;
            cursor: pointer;
        }
        .hamburger span{
            height: 3px;
            width: 25px;
            background: #fff;
            margin: 4px;
            border-radius: 5px;
        }
        @media(max-width: 768px){
            ul{
                position: absolute;
                top: 60px;
                right: 0;
                background: #2563eb;
                flex-direction: column;
                width: 200px;
                display: none;
            }
            ul.active{
                display: flex;
            }
            ul  li{
                margin: 10px 0;
                text-align: center;
            }
            .hamburger{
                display: flex;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">MySite</div>
        <div class="hamburger" onclick="ToggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <ul id="menu">
            <li><a href="#">Home</a>
            </li>
            <li><a href="#">Projects</a></li>
            <ul class="dropdown">
                <li><a href="#">Web Apps</a></li>
                <li><a href="#">UI Designer</a></li>
                <li><a href="#">Games</a></li>
            </ul>
        </li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
        </ul>
    </nav>
    <script>
        function ToggleMenu(){{
            document.getElementById("menu").classList.toggle("active");
        }}
    </script>
</body>

</html>
